# Publish to npm when a GitHub Release is published.
# Prerequisite: add repository secret NPM_TOKEN (npm automation token).
# See: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Publish Package to npmjs

on:
  release:
    types: [published]
  workflow_dispatch: # 加上这一行，就可以手动点按钮触发了

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Opt JavaScript actions into Node 24 until it is the runner default (see GitHub Actions changelog).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
